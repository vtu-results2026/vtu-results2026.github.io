<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>VTU PROVISIONAL RESULT</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="header">
<img src="assets/header.png">
</div>


<div class="orange-bar">

<div class="kn">
ವಿ.ತಾ.ವಿ ಸಾಮಯಿಕ ಫಲಿತಾಂಶ
</div>

<div class="en">
VTU PROVISIONAL RESULT
</div>

</div>


<div class="green-bar">

<div class="kn">
ಡಿಸೆಂಬರ್-2025 / ಜನವರಿ-2026 ಪರೀಕ್ಷೆಯ ಫಲಿತಾಂಶ
</div>

<div class="en">
DECEMBER-2025 / JANUARY-2026 EXAMINATION RESULTS
</div>

</div>


<div class="form-box">

<input id="usn" class="form-control" placeholder="Enter USN">

<br>

<input id="captchaInput" class="form-control" placeholder="Enter Captcha Code">

<br>

<div class="captcha-box">

<img id="captchaImage" src="assets/captcha.png">

<div class="refresh" onclick="generateCaptcha()">↻</div>

</div>

<br>

<button class="btn btn-success btn-block" onclick="checkUSN()">
ಸಲ್ಲಿಸಿ / Submit
</button>

<br>

<button class="btn btn-danger btn-block">
ರದ್ದುಪಡಿಸಿ / Cancel
</button>

<div id="output"></div>

</div>


<div class="footer">

© 2026 Designed & Developed by Project Management Cell (PMC), VTU, Belagavi. Karnataka. India.

</div>

</div>


<script src="js/jquery.min.js"></script>
<script src="js/script.js"></script>

</body>

</html>
