<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>VTU PROVISIONAL RESULT</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

<style>

#captchaImage{
font-size:26px;
font-weight:bold;
letter-spacing:4px;
background:#f3f3f3;
padding:10px;
border:1px solid #ccc;
width:180px;
text-align:center;
user-select:none;
}

.refresh{
cursor:pointer;
font-size:22px;
margin-left:10px;
}

#loadingBox{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #28a745;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>


<body>

<div class="container">

<div class="header">
<img src="assets/header.png">
</div>


<div class="orange-bar">

<div class="kn">
ವಿ.ತಾ.ವಿ ಸಾಮಯಿಕ ಫಲಿತಾಂಶ
</div>

<div class="en">
VTU PROVISIONAL RESULT
</div>

</div>


<div class="green-bar">

<div class="kn">
ಡಿಸೆಂಬರ್-2025 / ಜನವರಿ-2026 ಪರೀಕ್ಷೆಯ ಫಲಿತಾಂಶ
</div>

<div class="en">
DECEMBER-2025 / JANUARY-2026 EXAMINATION RESULTS
</div>

</div>



<div class="form-box" id="formBox">

<input id="usn" class="form-control" placeholder="Enter USN">

<br>

<input id="captchaInput" class="form-control" placeholder="Enter Captcha Code">

<br>

<div style="display:flex;align-items:center">

<div id="captchaImage"></div>

<div class="refresh" onclick="generateCaptcha()">↻</div>

</div>

<br>

<button class="btn btn-success btn-block" onclick="checkUSN()">
ಸಲ್ಲಿಸಿ / Submit
</button>

<br>

<button class="btn btn-danger btn-block" onclick="clearForm()">
ರದ್ದುಪಡಿಸಿ / Cancel
</button>

<div id="output" style="margin-top:10px;color:red;font-weight:bold"></div>

</div>



<div id="loadingBox">

<div class="spinner"></div>

<div style="font-size:18px;font-weight:bold">
Fetching results from VTU servers...
</div>

</div>



<div class="footer">

© 2026 Designed & Developed by Project Management Cell (PMC), VTU, Belagavi. Karnataka. India.

</div>

</div>



<script>

let captchaText="";


function generateCaptcha(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

captchaText="";

for(let i=0;i<5;i++){

captchaText+=chars[Math.floor(Math.random()*chars.length)];

}

document.getElementById("captchaImage").innerText=captchaText;

}



function clearForm(){

document.getElementById("usn").value="";
document.getElementById("captchaInput").value="";
document.getElementById("output").innerText="";
generateCaptcha();

}



function checkUSN(){

let usn=document.getElementById("usn").value.trim();
let captcha=document.getElementById("captchaInput").value.trim();


if(usn===""){

document.getElementById("output").innerText="Please enter USN";

return;

}


if(captcha===""){

document.getElementById("output").innerText="Please enter captcha";

return;

}


if(captcha.toUpperCase()!==captchaText){

document.getElementById("output").innerText="Invalid captcha";

generateCaptcha();

return;

}



/* show loading screen */

document.getElementById("formBox").style.display="none";

document.getElementById("loadingBox").style.display="block";


/* simulate server delay */

setTimeout(function(){

window.location.href="assets/result.png";

},3000);

}



window.onload=generateCaptcha;

</script>



</body>

</html>
